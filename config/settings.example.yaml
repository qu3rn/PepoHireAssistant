# Application settings – copy to config/settings.yaml and adjust to your needs

# Target role (used for scoring)
role: "Frontend Developer"

# Technologies you work with (used for scoring)
technologies:
  - React
  - TypeScript
  - Next.js
  - JavaScript
  - CSS
  - HTML

# Minimum expected salary (PLN/month, used for scoring)
min_salary_b2b: 18000
min_salary_uop: 12000

# Preferred locations (used for scoring)
locations:
  - Warszawa
  - Kraków
  - remote

# Contract types to consider
contract_types:
  - B2B
  - UoP

# Minimum score to consider an offer "good enough" for applying
auto_apply_min_score: 70

# Safety: always require manual confirmation before submitting
require_manual_confirm: true

# Skip offers without salary information
skip_without_salary: false

# LM Studio local LLM settings
lm_studio:
  enabled: true
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"
  model: "local-model"

# Form filling / browser automation settings
form_filling:
  # Run browser in non-headless mode (visible window) – useful for debugging
  headless: false
  # Add a delay between Playwright actions in milliseconds (0 = disabled)
  slow_mo_ms: 0
  # Master debug switch: enables screenshot on failure + form snapshot + step log
  debug: false
  # Save a screenshot when filling is partial or failed (effective when debug: true)
  screenshot_on_failure: true
  # Save a sanitized snapshot of detected form fields (no input values stored)
  save_form_snapshot: true
  # Save a step-by-step action log (no sensitive field values stored)
  save_step_log: true

# Answer generation settings
answers:
  enabled: true
  use_llm: true
  auto_fill_generated_answers: true
  require_review_for_low_confidence: true
  min_confidence_to_autofill: 0.65
  max_answer_chars: 600

# Answer profile – facts used to build answers for application form questions
answer_profile:
  short_bio: "Frontend developer focused on React, TypeScript and scalable UI architecture."
  years_experience: "5 years"
  strongest_skills:
    - React
    - TypeScript
    - Next.js
  industries:
    - SaaS
    - e-commerce
  work_style: "I value clear communication, ownership and pragmatic engineering."
  motivation_general: "I am looking for product-focused teams where I can build useful, maintainable frontend applications."
  salary_b2b: "18000 PLN net + VAT"
  salary_uop: "15000 PLN gross"
  english_level: "C1"

# Fill-in-the-blank templates for common question types
answer_templates:
  why_company: "I am interested in this role because it matches my experience with {technologies} and gives me a chance to work on {role} challenges."
  react_experience: "I have practical experience building frontend applications with React, TypeScript and modern UI tooling."
  availability: "{availability}"
  salary: "{salary_expectation}"

# Follow-up reminder settings
follow_up:
  enabled: true
  # Days after sending before showing the follow-up reminder
  default_follow_up_after_days: 5
  # Days after last contact before marking as "no response / stale"
  mark_no_response_after_days: 14
  # How far ahead to show upcoming due reminders in the dashboard
  show_due_within_days: 3
  # When false, Saturday/Sunday due dates are moved to the next Monday
  allow_weekend_due_dates: false

# Gmail read-only integration
gmail:
  enabled: false
  # Path to the OAuth 2.0 client credentials JSON downloaded from Google Cloud Console
  credentials_path: "config/google_credentials.json"
  # Path where the OAuth token is cached after first authorisation
  token_path: "config/google_token.json"
  # Always true; the app only requests the readonly scope
  readonly: true
  # How many days back to search
  scan_days_back: 30
  # Maximum number of Gmail messages to fetch per scan
  max_results: 100
  # Store full email bodies (not recommended – keep false unless you understand the implications)
  store_email_body: false
  # Store short email snippets (≤200 chars) for display in the UI
  store_snippet: true
  # Auto-apply status suggestions without user confirmation (keep false)
  auto_update_status: false

# Google Calendar integration
calendar:
  enabled: false
  # Path to the OAuth 2.0 client credentials JSON (same file as Gmail)
  credentials_path: "config/google_credentials.json"
  # Path where the calendar OAuth token is cached after first authorisation
  token_path: "config/google_calendar_token.json"
  # Which calendar to create events in ("primary" = your main calendar)
  calendar_id: "primary"
  # Timezone used for all calendar events
  timezone: "Europe/Warsaw"
  # Default interview duration in minutes
  default_interview_duration_minutes: 60
  # Whether to allow creating Google Calendar events (false = never auto-create)
  create_calendar_events: false
  # Whether to add popup reminders to created events
  add_reminders: true
  # How many minutes before the interview to show a reminder (multiple values allowed)
  reminder_minutes_before:
    - 1440   # 24 hours
    - 60     # 1 hour
